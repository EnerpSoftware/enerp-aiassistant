# /etc/nginx/sites-available/assistant.enerp.pl
# HTTP → redirect to HTTPS
server {
    listen 80;
    server_name assistant.enerp.pl _;

    # For local network access, also redirect to HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name assistant.enerp.pl _;

    ssl_certificate /home/rancher/assistant-web/selfsigned.crt;
    ssl_certificate_key /home/rancher/assistant-web/selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Proxy to FastAPI server on 8080
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }
}
